<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Flow NextGen</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>
        .split-layout {
            display: flex;
            width: 100%;
            max-width: 1100px; /* Increased width for better one-page flow */
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
            overflow: hidden;
            flex-direction: column;
        }

        @media (min-width: 850px) {
            .split-layout {
                flex-direction: row;
                min-height: 580px;
            }
        }

        .split-left {
            flex: 0.9;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (min-width: 850px) {
            .split-left {
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
            }
        }

        .split-right {
            flex: 1.2;
            padding: 1rem;
            background: rgba(2, 6, 23, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .receipt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 13px;
        }

        .receipt-total {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 0.8rem;
            margin-top: 0.8rem;
            font-weight: 800;
            font-size: 16px;
            color: var(--orange);
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--steel);
            font-weight: 700;
            margin-top: 1.5rem;
        }

        .checkout-frame {
            width: 100%;
            min-height: 480px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 1.5rem;
        }

        .feature-item {
            font-size: 11px;
            color: var(--steel);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feature-item svg {
            color: var(--orange);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-gradient"></div>
        <div class="glow-orb" style="width: 600px; height: 600px; top: -10%; left: -10%;"></div>
    </div>

    <div class="split-layout">
        <div class="split-left">
            <div class="logo-icon" style="width: 48px; height: 48px; padding: 8px; border-radius: 14px;">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />
                </svg>
            </div>
            
            <h1 style="font-size: 1.5rem; margin: 1rem 0 0.5rem 0;">Upgrade to Pro</h1>
            <p style="font-size: 0.9rem;">Join 2,000+ creators building the next generation of AI content.</p>

            <div class="receipt-card">
                <div class="receipt-row">
                    <span>Plan</span>
                    <span style="color: var(--frost);">Flow NextGen Pro</span>
                </div>
                <div class="receipt-row">
                    <span>Billing</span>
                    <span style="color: var(--frost);">Monthly Subscription</span>
                </div>
                <div class="receipt-total">
                    <span>Due Today</span>
                    <span id="dynamic-total">$12.00</span>
                </div>
            </div>

            <div class="features-grid">
                <div class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Unlimited Queue
                </div>
                <div class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Batch 4K DL
                </div>
                <div class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Character Pro
                </div>
                <div class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Priority Flow
                </div>
            </div>

            <div class="trust-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure Bank-Level Encryption
            </div>
        </div>
        
        <div class="split-right">
            <div class="checkout-frame" id="checkout-frame">
                <!-- Paddle injects here -->
                <div class="loader-wrap" id="checkout-loader">
                    <div class="spinner"></div>
                    <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--steel);">Initializing Secure Gateway</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const transactionId = urlParams.get('_ptxn');

        if (transactionId) {
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('_ptxn');
            window.history.replaceState({}, document.title, cleanUrl.toString());
        }

        if (!transactionId) {
            document.body.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #ff4444;">
                    <div>
                        <h2 style="margin-bottom: 12px;">Session Expired</h2>
                        <p style="color: var(--steel); font-size: 14px;">Please restart the upgrade from the extension settings.</p>
                    </div>
                </div>
            `;
        } else {
            try {
                Paddle.Environment.set('sandbox'); 
                
                Paddle.Initialize({ 
                    token: 'test_642b6f7a9376de533fddfde430b',
                    eventCallback: function(event) {
                        console.log("Paddle Event:", event);
                        if (event.name === 'checkout.loaded' || event.name === 'checkout.updated') {
                            document.getElementById('checkout-loader').style.display = 'none';
                            // Update dynamic total from Paddle data
                            if (event.data.totals) {
                                const currency = event.data.totals.currency_code === 'USD' ? '$' : event.data.totals.currency_code;
                                document.getElementById('dynamic-total').innerText = currency + (event.data.totals.total / 100).toFixed(2);
                            }
                        }
                        if (event.name === 'checkout.completed') {
                            window.location.href = 'success.html';
                        }
                        if (event.name === 'checkout.closed') {
                            // Explicit cancel handling
                            document.body.innerHTML = `
                                <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center;">
                                    <div>
                                        <h2 style="margin-bottom: 16px;">Checkout Canceled</h2>
                                        <p style="color: var(--steel); font-size: 14px; margin-bottom: 24px;">The transaction was closed. You can safely close this tab.</p>
                                        <button onclick="window.close()" class="btn" style="max-width: 200px;">Close Window</button>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });

                Paddle.Checkout.open({
                    transactionId: transactionId,
                    settings: {
                        displayMode: "inline",
                        frameTarget: "checkout-frame",
                        frameInitialHeight: 450,
                        theme: "dark",
                        allowLogout: false
                    },
                    customer: {
                        email: email
                    }
                });
            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }
    </script>
</body>
</html>
