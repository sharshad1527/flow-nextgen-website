<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Flow NextGen</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.paddle.com/paddle/v3/paddle.js"></script>
    <style>
        .email-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            font-size: 12px;
            color: var(--steel);
            font-weight: 600;
            margin-bottom: 32px;
        }

        .email-badge span {
            color: var(--orange);
        }

        #checkout-container {
            min-height: 400px;
            width: 100%;
        }

        .loader-wrap {
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-gradient"></div>
        <div class="glow-orb" style="width: 500px; height: 500px; top: -5%; left: -5%;"></div>
    </div>

    <div class="glass-card">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />
                    <path d="M 20 30 L 27 25 L 35 20 L 28 25 Z" fill="#FFB380" opacity="0.5" />
                </svg>
            </div>
            <h1>Complete Upgrade</h1>
        </div>

        <div class="email-badge" id="user-info">
            Securing Pro for: <span id="user-email">Loading...</span>
        </div>

        <div id="checkout-container">
            <div class="loader-wrap" id="checkout-loader">
                <div class="spinner"></div>
                <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--steel);">Initializing Secure Gateway</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="footer-hint">
            Powered by Paddle &bull; Secure Encryption
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const transactionId = urlParams.get('_ptxn');

        if (!transactionId) {
            document.querySelector('.glass-card').innerHTML = `
                <div style="color: #ff4444; font-weight: 800; padding: 20px;">
                    <h2 style="margin-bottom: 16px;">Invalid Session</h2>
                    <p style="font-size: 13px; color: var(--steel);">No transaction ID found. Please restart the upgrade from the extension.</p>
                </div>
            `;
        } else {
            document.getElementById('user-email').textContent = email || 'Authenticated User';

            Paddle.Environment.set('sandbox'); 
            Paddle.Initialize({ 
                token: 'test_864122268aea058d132b5b44ddd', 
                eventCallback: function(event) {
                    if (event.name === 'checkout.loaded') {
                        document.getElementById('checkout-loader').style.display = 'none';
                    }
                    if (event.name === 'checkout.completed') {
                        window.location.href = '/success.html';
                    }
                }
            });

            Paddle.Checkout.open({
                settings: {
                    displayMode: "inline",
                    container: "#checkout-container",
                    theme: "dark",
                    locale: "en"
                },
                transactionId: transactionId
            });
        }
    </script>
</body>
</html>
