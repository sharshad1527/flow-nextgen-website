<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Flow NextGen</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>
        .split-layout {
            display: flex;
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
            overflow: hidden;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .split-layout {
                flex-direction: row;
            }
        }

        .split-left {
            flex: 1;
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (min-width: 768px) {
            .split-left {
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
            }
        }

        .split-right {
            flex: 1.2;
            padding: 2rem;
            background: rgba(2, 6, 23, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .email-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            font-size: 12px;
            color: var(--steel);
            font-weight: 600;
            margin-bottom: 2rem;
            align-self: flex-start;
        }

        .email-badge span {
            color: var(--orange);
        }

        .checkout-frame {
            width: 100%;
            min-width: 312px;
            min-height: 500px;
            position: relative;
        }

        .loader-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
        }

        .features-list {
            list-style: none;
            text-align: left;
            margin-top: 2rem;
        }

        .features-list li {
            font-size: 0.9rem;
            color: var(--steel);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .features-list li svg {
            color: var(--orange);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-gradient"></div>
        <div class="glow-orb" style="width: 500px; height: 500px; top: -5%; left: -5%;"></div>
    </div>

    <div class="split-layout" id="main-card">
        <div class="split-left">
            <div class="logo-icon" style="margin: 0 0 1.5rem 0; width: 64px; height: 64px; padding: 10px;">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />
                    <path d="M 20 30 L 27 25 L 35 20 L 28 25 Z" fill="#FFB380" opacity="0.5" />
                </svg>
            </div>
            <h1 id="page-title" style="text-align: left; font-size: 1.8rem; margin-bottom: 1rem;">Upgrade to Pro</h1>
            
            <div class="email-badge" id="user-info">
                Account: <span id="user-email">Loading...</span>
            </div>

            <p style="text-align: left; font-size: 1rem; color: var(--frost);">
                Unlock the full power of Flow NextGen.
            </p>

            <ul class="features-list">
                <li>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Feature 1
                </li>
                <li>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Feature 2
                </li>
                <li>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Feature 3
                </li>
            </ul>

            <div class="footer-hint" style="text-align: left; margin-top: auto; padding-top: 2rem;">
                Powered by Paddle &bull; Secure Encryption
            </div>
        </div>
        
        <div class="split-right">
            <div class="checkout-frame" id="checkout-container">
                <div class="loader-wrap" id="checkout-loader">
                    <div class="spinner"></div>
                    <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--steel);">Initializing Secure Gateway</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const transactionId = urlParams.get('_ptxn');

        // CRITICAL FIX: Hide _ptxn from the URL immediately so Paddle.js doesn't auto-open a duplicate checkout
        if (transactionId) {
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('_ptxn');
            window.history.replaceState({}, document.title, cleanUrl.toString());
        }

        if (!transactionId) {
            document.querySelector('.split-layout').innerHTML = `
                <div style="color: #ff4444; font-weight: 800; padding: 40px; text-align: center; width: 100%;">
                    <h2 style="margin-bottom: 16px;">Invalid Session</h2>
                    <p style="font-size: 13px; color: var(--steel);">No transaction ID found. Please restart the upgrade from the extension.</p>
                </div>
            `;
        } else {
            document.getElementById('user-email').textContent = email || 'Authenticated User';

            function showError(message, details = '') {
                const container = document.querySelector('.checkout-frame');
                container.innerHTML = `
                    <div style="background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3); border-radius: 16px; padding: 24px; text-align: left; margin-top: 20px;">
                        <div style="color: #ff4444; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; font-size: 14px;">Checkout Rejected</div>
                        <div style="color: var(--frost); font-size: 12px; margin-bottom: 8px;">${message}</div>
                        ${details ? `<div style="color: var(--steel); font-size: 10px; font-family: monospace; word-break: break-all;">${details}</div>` : ''}
                    </div>
                `;
            }

            try {
                Paddle.Environment.set('sandbox'); 
                
                Paddle.Initialize({ 
                    token: 'test_642b6f7a9376de533fddfde430b',
                    checkout: {
                        settings: {
                            displayMode: "inline",
                            frameTarget: "checkout-frame",
                            frameInitialHeight: 450,
                            frameStyle: "width: 100%; min-width: 312px; background-color: transparent; border: none;",
                            theme: "dark",
                            locale: "en",
                            allowedPaymentMethods: ["card", "paypal", "apple_pay", "google_pay"]
                        }
                    },
                    eventCallback: function(event) {
                        console.log("Paddle Event:", event);
                        if (event.name === 'checkout.loaded') {
                            const loader = document.getElementById('checkout-loader');
                            if(loader) loader.style.display = 'none';
                        }
                        if (event.name === 'checkout.completed') {
                            window.location.href = '/success.html';
                        }
                        if (event.name === 'checkout.error') {
                            showError("Paddle encountered an error during checkout.", JSON.stringify(event.data));
                        }
                        if (event.name === 'checkout.closed') {
                            document.getElementById('page-title').innerText = "Checkout Canceled";
                            const container = document.querySelector('.checkout-frame');
                            container.style.minHeight = 'auto';
                            container.innerHTML = `
                                <div style="padding: 20px; color: var(--steel); font-size: 13px; line-height: 1.6; text-align: center;">
                                    You have canceled the checkout process.<br><br>
                                    <button onclick="window.close()" class="btn" style="margin-top: 24px;">Close Tab & Return</button>
                                </div>
                            `;
                        }
                    }
                });

                // Open checkout WITHOUT displayMode settings to prevent override bugs
                Paddle.Checkout.open({
                    transactionId: transactionId,
                    customer: {
                        email: email
                    }
                });
            } catch (err) {
                console.error("Initialization Error:", err);
                showError("Failed to initialize the secure gateway.", err.message || err.toString());
            }
        }
    </script>
</body>
</html>
