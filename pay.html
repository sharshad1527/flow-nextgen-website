<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Flow-NextGen</title>
    <script src="https://cdn.paddle.com/paddle/v3/paddle.js"></script>
    <style>
        :root {
            --orange: #ff6b00;
            --obsidian: #0d0d0d;
            --onyx: #161616;
            --frost: #f5f5f5;
            --steel: #808080;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--obsidian);
            color: var(--frost);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Blobs */
        .blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--orange);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        .payment-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            background: rgba(22, 22, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: var(--onyx);
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 8px;
        }

        .email-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            font-size: 12px;
            color: var(--steel);
            font-weight: 600;
            margin-bottom: 32px;
        }

        .email-badge span {
            color: var(--orange);
        }

        #checkout-container {
            min-height: 400px;
            width: 100%;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: 40px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 107, 0, 0.1);
            border-top: 3px solid var(--orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 24px;
            font-size: 10px;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="blobs">
        <div class="blob" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
        <div class="blob" style="width: 300px; height: 300px; bottom: 10%; right: 10%; background: #333;"></div>
    </div>

    <div class="payment-card">
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#ff6b00" stroke="#ff6b00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Complete Upgrade</h1>
        <div class="email-badge" id="user-info">
            Securing Pro for: <span id="user-email">Loading...</span>
        </div>

        <div id="checkout-container">
            <div class="loader" id="checkout-loader">
                <div class="spinner"></div>
                <div style="font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--steel);">Initializing Secure Gateway</div>
            </div>
        </div>

        <div class="footer">
            Powered by Paddle &bull; Secure 256-bit Encryption
        </div>
    </div>

    <script>
        // 1. Get URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const transactionId = urlParams.get('_ptxn');

        if (!transactionId) {
            document.querySelector('.payment-card').innerHTML = `
                <div style="color: #ff4444; font-weight: 800; padding: 40px;">
                    <h1 style="margin-bottom: 16px;">Invalid Session</h1>
                    <p style="font-size: 12px; color: #888;">No transaction ID found. Please restart the upgrade from the extension.</p>
                </div>
            `;
        } else {
            document.getElementById('user-email').textContent = email || 'Authenticated User';

            // 2. Initialize Paddle
            Paddle.Environment.set('sandbox'); // Always sandbox for now
            Paddle.Initialize({ 
                token: 'test_864122268aea058d132b5b44ddd', // Your sandbox client token
                eventCallback: function(event) {
                    if (event.name === 'checkout.loaded') {
                        document.getElementById('checkout-loader').style.display = 'none';
                    }
                    if (event.name === 'checkout.completed') {
                        window.location.href = '/success.html'; // We'll build this next
                    }
                }
            });

            // 3. Open Inline Checkout
            Paddle.Checkout.open({
                settings: {
                    displayMode: "inline",
                    container: "#checkout-container",
                    theme: "dark",
                    locale: "en"
                },
                transactionId: transactionId
            });
        }
    </script>
</body>
</html>
