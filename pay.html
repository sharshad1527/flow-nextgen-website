<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Flow NextGen</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>
        .split-layout {
            display: flex;
            width: 100%;
            max-width: 940px; /* Reduced from 1100px */
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
            overflow: hidden;
            flex-direction: column;
            margin: 20px;
        }

        @media (min-width: 850px) {
            .split-layout {
                flex-direction: row;
                min-height: 480px; /* Reduced from 520px */
            }
        }

        .split-left {
            flex: 0.7; /* Narrower left panel */
            padding: 1.5rem 1.5rem; /* Reduced padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (min-width: 850px) {
            .split-left {
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
            }
        }

        .split-right {
            flex: 1.3; /* Wider right panel for checkout */
            padding: 0.5rem 1.5rem; /* Reduced horizontal padding */
            background: rgba(2, 6, 23, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-top: 0.5rem; /* Moved up slightly */
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-transform: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-prefix {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6) !important; /* Soft white */
            text-transform: none;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .brand-white { color: #ffffff !important; }
        .brand-orange { color: #ff6b00 !important; }

        .tagline {
            font-size: 0.8rem;
            color: var(--steel);
            line-height: 1.5;
            margin-top: 0.4rem;
            max-width: 240px;
        }

        .receipt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 2rem; /* Placed lower */
            width: 100%;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            font-size: 11px;
            color: var(--steel);
        }

        .receipt-total {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 0.5rem;
            margin-top: 0.5rem;
            font-weight: 800;
            font-size: 14px;
            color: #ff6b00;
        }

        .trust-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--steel);
            font-weight: 700;
            margin-top: 1.5rem; /* Manual spacing instead of auto */
            opacity: 0.6;
        }

        .legal-footer {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 8px;
            margin-top: 8px;
            opacity: 0.5;
            width: 100%;
        }

        .legal-footer a {
            color: var(--steel);
            text-decoration: none;
            transition: color 0.2s;
        }

        .legal-footer a:hover {
            color: #ffffff;
        }

        .checkout-frame {
            width: 100%;
            min-height: 340px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 1.2rem 0;
            margin-bottom: 0.5rem; /* Pull up towards the badge */
            width: 100%;
            justify-items: center;
        }

        .feature-item {
            font-size: 10px; /* Reduced from 11px */
            color: var(--steel);
            display: flex;
            align-items: center;
            gap: 5px;
            text-align: left;
            width: 110px; /* More compact */
        }

        .feature-item svg {
            color: #ff6b00;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-gradient"></div>
        <div class="glow-orb" style="width: 600px; height: 600px; top: -10%; left: -10%;"></div>
    </div>

    <div class="split-layout">
        <div class="split-left">
            <!-- LOGO INCREASED TO 72PX -->
            <div class="logo-icon" style="width: 72px; height: 72px; padding: 12px; border-radius: 20px;">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />
                </svg>
            </div>
            
            <h1 class="brand-name">
                <span class="brand-prefix" style="color: rgba(255, 255, 255, 0.6) !important;">Subscribe to</span>
                <span><span class="brand-white" style="color: #ffffff !important;">FLOW</span><span class="brand-orange" style="color: #ff6b00 !important;">NextGen</span></span>
            </h1>
            <p class="tagline">Professional AI toolkit for creators.</p>

            <div class="receipt-card">
                <div class="receipt-row">
                    <span>Plan</span>
                    <span style="color: var(--frost);">Flow NextGen Pro</span>
                </div>
                <div class="receipt-row">
                    <span>Subtotal</span>
                    <span id="dynamic-subtotal">Calculating...</span>
                </div>
                <div class="receipt-row">
                    <span>Tax</span>
                    <span id="dynamic-tax">--</span>
                </div>
                <div class="receipt-total">
                    <span>Total Due Today</span>
                    <span id="dynamic-total">Calculating...</span>
                </div>
            </div>

            <div class="features-grid">
                <div class="feature-item">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Unlimited Queue
                </div>
                <div class="feature-item">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Batch 4K DL
                </div>
                <div class="feature-item">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Character Pro
                </div>
                <div class="feature-item">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Priority Flow
                </div>
            </div>

            <div class="trust-badge">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure Checkout &bull; Powered by Paddle
            </div>

            <div class="legal-footer">
                <a href="https://flownextgen.netlify.app/terms" target="_blank">Terms</a>
                <a href="https://flownextgen.netlify.app/privacy" target="_blank">Privacy</a>
                <a href="mailto:support.flownextgen@gmail.com">Contact</a>
            </div>
        </div>
        
        <div class="split-right">
            <div class="checkout-frame" id="checkout-frame">
                <!-- Paddle injects here -->
                <div class="loader-wrap" id="checkout-loader">
                    <div class="spinner"></div>
                    <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--steel);">Initializing Secure Gateway</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const transactionId = urlParams.get('_ptxn');

        if (transactionId) {
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('_ptxn');
            window.history.replaceState({}, document.title, cleanUrl.toString());
        }

        if (!transactionId) {
            document.body.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #ff4444;">
                    <div>
                        <h2 style="margin-bottom: 12px;">Session Expired</h2>
                        <p style="color: var(--steel); font-size: 14px;">Please restart the upgrade from the extension settings.</p>
                    </div>
                </div>
            `;
        } else {
            try {
                Paddle.Environment.set('sandbox'); 
                
                Paddle.Initialize({ 
                    token: 'test_642b6f7a9376de533fddfde430b',
                    checkout: {
                        settings: {
                            displayMode: "inline",
                            frameTarget: "checkout-frame",
                            frameInitialHeight: 340,
                            frameStyle: "width: 100%; min-width: 312px; background-color: transparent; border: none;",
                            theme: "dark",
                            allowLogout: false
                        }
                    },
                    eventCallback: function(event) {
                        console.log("Paddle Event:", event);
                        if (event.name === 'checkout.loaded' || event.name === 'checkout.updated') {
                            document.getElementById('checkout-loader').style.display = 'none';
                            
                            const data = event.data;
                            if (data && data.totals) {
                                const totals = data.totals;
                                const currency = data.currency_code === 'USD' ? '$' : (data.currency_code || '$');
                                
                                // FIX: Paddle v2 returns totals as decimal strings (e.g., "10.00")
                                // Do not divide by 100 if it's already a decimal.
                                const subtotal = parseFloat(totals.subtotal).toFixed(2);
                                const tax = parseFloat(totals.tax).toFixed(2);
                                const total = parseFloat(totals.total).toFixed(2);

                                document.getElementById('dynamic-subtotal').innerText = currency + subtotal;
                                document.getElementById('dynamic-tax').innerText = currency + tax;
                                document.getElementById('dynamic-total').innerText = currency + total;
                                
                                console.log(`UI Updated: Subtotal=${subtotal}, Tax=${tax}, Total=${total}`);
                            }
                        }
                        if (event.name === 'checkout.completed') {
                            window.location.href = 'success.html';
                        }
                        if (event.name === 'checkout.closed') {
                            document.body.innerHTML = `
                                <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center;">
                                    <div>
                                        <h2 style="margin-bottom: 16px;">Checkout Canceled</h2>
                                        <p style="color: var(--steel); font-size: 14px; margin-bottom: 24px;">The transaction was closed. You can safely close this tab.</p>
                                        <button onclick="window.close()" class="btn" style="max-width: 200px;">Close Window</button>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });

                 Paddle.Checkout.open({
                    transactionId: transactionId,
                    customer: {
                        email: email
                    }
                });
            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }
    </script>
</body>
</html>
