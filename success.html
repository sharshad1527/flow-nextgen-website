<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Flow-NextGen</title>
    <style>
        :root {
            --orange: #ff6b00;
            --obsidian: #0d0d0d;
            --onyx: #161616;
            --frost: #f5f5f5;
            --steel: #808080;
            --emerald: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--obsidian);
            color: var(--frost);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--emerald);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        .success-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(22, 22, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--emerald);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 16px;
        }

        p {
            font-size: 14px;
            color: var(--steel);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: var(--frost);
            color: var(--obsidian);
            text-decoration: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="blobs">
        <div class="blob" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
    </div>

    <div class="success-card">
        <div class="icon-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Upgrade Complete</h1>
        <p>Your Pro membership is now active. You can close this tab and return to the extension to start using your unlimited quota.</p>
        <a href="#" onclick="window.close()" class="btn">Close Tab</a>
    </div>

    <script>
        // Optional: Send message to extension if needed
        // For now, simple close is fine as the webhook handles the rest
    </script>
</body>
</html>
