<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow NextGen | Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-gradient"></div>
        <div class="glow-orb" style="width: 600px; height: 600px; top: -10%; right: -10%;"></div>
        <div class="glow-orb" style="width: 400px; height: 400px; bottom: -10%; left: -10%; background: #1e293b; opacity: 0.3;"></div>

    <div class="glass-card">

                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />

            <h1 class="brand-name">Flow <span>NextGen</span></h1>
        </div>

        <div class="status-section">
            <div class="badge">Development Stage</div>
            <h2>Under Construction</h2>
            <p>
                Crafting the ultimate high-fidelity automation engine for the next generation of creators. Something legendary is in the works.
            </p>
            
            <div class="divider"></div>
            
            <div class="footer-hint">
                Coming soon to your browser
            </div>
        </div>
    </div>
