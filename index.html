<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow NextGen | Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blobs">
        <div class="blob" style="width: 500px; height: 500px; top: -10%; right: -10%;"></div>
        <div class="blob" style="width: 400px; height: 400px; bottom: -10%; left: -10%; background: #334155;"></div>
    </div>

    <div class="checkout-card construction-card">
        <div class="logo-container">
            <div class="logo-icon">
                <!-- Our Hosted Logo (Embedded SVG - Exact match of the 3D Extension Logo) -->
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
                    <!-- Left 3D Pillar -->
                    <path d="M 20 30 L 20 85 L 35 75 L 35 20 Z" fill="#E54D00" />
                    <!-- Right 3D Pillar -->
                    <path d="M 65 30 L 65 85 L 80 75 L 80 20 Z" fill="#FF8A00" />
                    <!-- 3D Bridge connecting them -->
                    <path d="M 35 45 L 65 30 L 65 45 L 35 60 Z" fill="#FFFFFF" />
                    <!-- Top Caps for depth -->
                    <path d="M 20 30 L 27 25 L 35 20 L 28 25 Z" fill="#FFB380" opacity="0.5" />
                </svg>
            </div>
            <h1 class="brand-name">Flow <span>NextGen</span></h1>
        </div>

        <div class="status-section">
            <div class="badge">Development Stage</div>
            <h2>Under Construction</h2>
            <p>
                Flow NextGen is currently in the active building phase. We are crafting the ultimate high-fidelity automation engine for the next generation of creators.
            </p>
            
            <div class="divider"></div>
            
            <div class="social-hint">
                Coming soon to your favorite browser.
            </div>
        </div>
    </div>
</body>
</html>
