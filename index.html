<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow NextGen | Secure Checkout</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Paddle.js V2 -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body>
    <div class="checkout-card">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                </svg>
            </div>
            <h1 class="brand-name">Flow <span>NextGen</span></h1>
        </div>

        <div class="status-section">
            <div class="loader"></div>
            <h2>Secure Checkout</h2>
            <p>Initializing Paddle v3 Engine...<br>Please do not refresh this page.</p>
        </div>
    </div>

    <script>
        // 1. INITIALIZE PADDLE
        // You MUST replace 'YOUR_CLIENT_TOKEN' with your real token from Paddle
        try {
            Paddle.Initialize({ 
                token: 'test_864122268aea058d132b5b44ddd', 
                eventCallback: function(event) {

                    console.log("Paddle Event:", event.name, event);
                    if (event.name === 'checkout.loaded') {
                        document.querySelector('p').innerText = "Secure checkout loaded. Finalizing payment window...";
                    }
                    if (event.name === 'checkout.closed') {
                        document.querySelector('h2').innerText = "Checkout Closed";
                        document.querySelector('p').innerText = "You can close this tab and return to the extension.";
                        document.querySelector('.loader').style.display = 'none';
                    }
                }
            });

            // 2. EXPLICIT TRIGGER
            // Sometimes auto-detection fails, so we manually check the URL
            const urlParams = new URLSearchParams(window.location.search);
            const txnId = urlParams.get('_ptxn');

            if (txnId) {
                console.log("Found Transaction ID:", txnId);
                Paddle.Checkout.open({
                    transactionId: txnId,
                    settings: {
                        displayMode: 'overlay',
                        theme: 'dark'
                    }
                });
            } else {
                console.warn("No transaction ID found in URL.");
                document.querySelector('p').innerText = "No transaction found. Please start checkout from the extension.";
            }
        } catch (err) {
            console.error("Paddle Initialization Error:", err);
            document.querySelector('p').innerText = "Error: " + err.message;
        }
    </script>
</body>
</html>
